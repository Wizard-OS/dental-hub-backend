services:
  db:
    image: postgres:14.3
    restart: always
    ports:
      - '${DB_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-DentalHubDB}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-DentalHubDB}']
      interval: 5s
      timeout: 3s
      retries: 10
    container_name: dental_hub_db
    volumes:
      - ./postgres:/var/lib/postgresql/data
